<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type conversions and Regular expressions</title>
</head>
<body>
    <script>

        //use of typeof operator
        let name = "John";
        let num = 5;
        let x;
        document.write(typeof(name));
        document.write("<br>");
        document.write(typeof(num));
        document.write("<br>");
        document.write(typeof(x));
        document.write("<br>");
           //use of string
           //string is a method that changes your data type into string
        let a = 4;
        let b = 5;
        document.write(a+b);
        document.write("<br>");
        document.write(String(a)+String(b)); //does not add because it is a string it concatenates
        document.write("<br>");
        //use of search
        let sentence = "Fall in love with Coding";
        document.write(sentence.search("in"));
        document.write("<br>");
    </script>
</body>
</html>
