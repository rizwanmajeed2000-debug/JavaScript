<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loops</title>
</head>
<body>
    <P>Loops are used to execute a block of code over and over again.</P>
    <script>
        //for (statement 1(initialization), statement 2(condition), statement 3(increment/decrement)){
        //code to be executed}
        let count = 5;
        for(i=0; i <= count; i++){//i=0, 0<5, 1+2=3
            document.write("Hello world<br>");
        }
        for (i = 0; i <= count; i++){//i=0, 0<5, 1+2=3
                document.write(i + "<br>");
            }
    </script>
</body>
</html>
