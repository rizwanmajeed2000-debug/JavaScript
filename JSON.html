<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Converting JSON to JS</title>
</head>
<body>
    <h2>Converting JSON to JS</h2>
    <p id="result"></p>
    <script>
        var myObj = { name: "Riya", age: 13, grade: 7 };
        var myJSON = JSON.stringify(myObj);
        var newObj = JSON.parse(myJSON);
        document.getElementById("result").innerHTML = newObj.name;
    </script>
</body>
</html>
