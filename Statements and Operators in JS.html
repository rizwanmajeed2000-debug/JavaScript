<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statements and Operators</title>
</head>
<body>
    <p id="demo1"></p>
    <p id="demo2"></p>
    <p id="demo3"></p>
    <p id="demo4"></p>
    <p id="demo5"></p>


    <script>
        <!--Addition-->
        //*use +, -, *, / operators*/
        var x = 5; //statement 1
        var y = 2; //statement 2
        var z = x + y; //statement 3
        var a = x - y; //statement 4
        var b = x * y; //statement 5
        var c = x / y; //statement 6
        var d = x % y //statement 7

        document.getElementById("demo1").innerHTML="The sum is " + z;
        document.getElementById("demo2").innerHTML = "The difference is " + a;
        document.getElementById("demo3").innerHTML = "The product is " + b;
        document.getElementById("demo4").innerHTML = "The quotient is " + c;
        document.getElementById("demo5").innerHTML = "The remainder is " + d;


    </script>
</body>
</html>
