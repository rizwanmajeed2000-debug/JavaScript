<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrays in JS</title>
</head>
<body>
    <h2>JavaScript Arrays</h2>
    <p id="demo"></p>
    <p id="demo1"></p>
    <p id="demo2"></p>
    <p id="demo3"></p>
    <script>
        var cars = [
            "Tesla Model 3",
            "Hyundai Tucson",
            "Toyota RAV4",
            "Ford Puma",
            "Vauxhall Corsa"

        ];
        document.getElementById("demo").innerHTML=cars[1];
        document.getElementById("demo1").innerHTML=cars[2];document.getElementById("demo2").innerHTML=cars[0];
        document.getElementById("demo3").innerHTML = cars[4];



    </script>
</body>
</html>
