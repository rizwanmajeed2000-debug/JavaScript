<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functions in HTML</title>
</head>
<body>
    <button onclick="myFunction()">Click me</button>
    <script>
        function myFunction(){
            document.write("Hello World!");
            document.write("<br>");
            document.write("Welcome to Javascript.")
        }

    </script>
</body>
</html>
