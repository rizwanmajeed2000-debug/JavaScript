<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Methods in Javascript</title>
</head>
<body>
    <h2>JavaScript String Methods</h2>
    <p>Basic Methods</p>
    <p>We can perform actions using methods in JavaScript.</p>
    <script>
        //.methodname()
        //string, number, Boolean (true or false)
        //toUpperCase it is used to convert lower case to upper case
        //toLowerCase 
        let str = "HellO woRlD";
        document.write(str.toUpperCase());
        document.write("<br>");
        document.write(str.toLowerCase());
        document.write("<br>");
        document.write("<br>");
        document.write(str.startsWith("o"));

        //random() method is used to generate random numbers between 0 and 1
        document.write("<br>");
        document.write(Math.random());
        //floor() method is used to round off a number
        document.write("<br>");
        document.write(Math.floor(5.999));


    </script>
</body>
</html>
